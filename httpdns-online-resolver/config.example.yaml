service:
  host: "0.0.0.0"
  port: 8088
  timeout_seconds: 10
  dispatch_refresh_interval_seconds: 3600

httpdns:
  account_id: "<YOUR_ACCOUNT_ID>"
  aes_key: "<YOUR_AES_KEY>"
  sign_key: "<YOUR_SIGN_KEY>"
  sign_algorithm: "hmac-sha1"
  sign_param_name: "sign"
  dispatch_host: "r.pp.fgnlo.com"
  resolve_host: "r.dp.dgovl.com"
  default_sdns_os: "ios"

ip2region:
  v4_xdb: "/opt/ip2region/data/ip2region_v4.xdb"
  v6_xdb: "/opt/ip2region/data/ip2region_v6.xdb"
  auto_update: true
  update_interval_seconds: 3600
  download_timeout_seconds: 1200
  releases_url: "https://api.github.com/repos/lionsoul2014/ip2region/releases/latest"
  github_token: "${GITHUB_TOKEN}"
  version_file: "/opt/ip2region/data/.ip2region_release_tag"
